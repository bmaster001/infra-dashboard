<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infra Status</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Infra Status</h1>
      <span class="host">status.anoebis.be</span>
    </div>
    <div class="header-right">
      <span id="refresh-indicator" class="refresh-dot" title="Auto-refresh actief"></span>
      <span id="last-updated" class="last-updated">Laden…</span>
    </div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="infra">Infrastructuur</button>
    <button class="tab-btn" data-tab="ipscan">IP-adressen</button>
  </nav>

  <section id="panel-dashboard" class="tab-panel active">
    <main id="main">
      <!-- Sections are injected dynamically from config -->
    </main>
  </section>

  <section id="panel-infra" class="tab-panel" hidden>
    <div id="tree-root" class="tree-root"></div>
  </section>

  <section id="panel-ipscan" class="tab-panel" hidden>
    <div id="ipscan-root" class="ipscan-root"></div>
  </section>

  <script src="app.js"></script>
  <script src="tree.js"></script>
  <script src="ipscan.js"></script>
  <script src="nav.js"></script>
</body>
</html>
